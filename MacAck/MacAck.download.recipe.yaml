Description: Downloads the latest release of MacAck from GitHub and verifies its code signature.
Identifier: com.github.aanklewicz.download.MacAck
MinimumVersion: "2.3"

Input:
  NAME: MacAck

Process:
- Processor: GitHubReleasesInfoProvider
  Arguments:
    github_repo: aanklewicz/MacAck
    asset_regex: ^MacAck\.dmg$

- Processor: URLDownloader
  Arguments:
    filename: "%NAME%-%version%.dmg"

- Processor: EndOfCheckPhase

- Processor: CodeSignatureVerifier
  Arguments:
    input_path: "%pathname%/MacAck.app"
    requirement: 'anchor apple generic and identifier "com.neverhadtofight.MacAck" and (certificate leaf[field.1.2.840.113635.100.6.1.9] /* exists */ or certificate 1[field.1.2.840.113635.100.6.2.6] /* exists */ and certificate leaf[field.1.2.840.113635.100.6.1.13] /* exists */ and certificate leaf[subject.OU] = "P99P2U46EY")'
